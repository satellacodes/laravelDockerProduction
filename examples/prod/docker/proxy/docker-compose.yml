version: "3.9"

services:
  proxy:
    image: nginx:1.28-alpine

    container_name: reverse-proxy

    restart: unless-stopped

    ports:
      - "80:80"

      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      - ./nginx/conf.d:/etc/nginx/conf.d:ro

      - ./ssl:/etc/nginx/ssl:ro

    networks:
      - backend

networks:
  backend:
    external: true
