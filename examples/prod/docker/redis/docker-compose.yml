version: "3.9"

services:
  redis:
    image: redis:7-alpine

    container_name: redis

    restart: unless-stopped

    command:
      - redis-server

      - --appendonly

      - "yes"

      - --maxmemory

      - 256mb

      - --maxmemory-policy

      - allkeys-lru

    volumes:
      - redis_data:/data

    networks:
      - backend

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

      interval: 30s

      timeout: 10s

      retries: 5

volumes:
  redis_data:

networks:
  backend:
    external: true
